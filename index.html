<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pomo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #c8c8c8;
    --accent: #e8e8e8;
    --dim: #444;
    --work: #d4d4d4;
    --break: #888;
    --cursor: #c8c8c8;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* THE CLOCK — only visible element */
  #clock {
    font-size: clamp(80px, 18vw, 180px);
    font-weight: 400;
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--accent);
    transition: color 0.4s ease, opacity 0.2s;
    font-variant-numeric: tabular-nums;
  }

  #clock.paused {
    animation: blink 1.2s step-start infinite;
  }

  #clock.break-mode {
    color: var(--break);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }

  /* subtle status line — barely visible, CLI feel */
  #status {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 18px;
    height: 14px;
    transition: color 0.3s;
  }

  #status.visible {
    color: #555;
  }

  /* bottom hint bar */
  #hint {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #2a2a2a;
    letter-spacing: 0.15em;
    white-space: nowrap;
    transition: color 0.3s;
  }

  body:hover #hint {
    color: #3a3a3a;
  }

  /* flash overlay on session end */
  #flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s;
  }

  #flash.go {
    opacity: 0.06;
    transition: opacity 0.8s ease-out;
  }

  /* progress ring — ultra thin, barely there */
  #ring-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  #ring {
    width: min(70vw, 70vh);
    height: min(70vw, 70vh);
  }

  #ring circle.track {
    fill: none;
    stroke: #1a1a1a;
    stroke-width: 1;
  }

  #ring circle.prog {
    fill: none;
    stroke: #333;
    stroke-width: 1;
    stroke-linecap: butt;
    transform-origin: center;
    transform: rotate(-90deg);
    transition: stroke-dashoffset 1s linear, stroke 0.4s;
  }

  #ring circle.prog.break-mode {
    stroke: #222;
  }
</style>
</head>
<body>

<div id="ring-wrap">
  <svg id="ring" viewBox="0 0 200 200">
    <circle class="prog"  cx="100" cy="100" r="96" id="progCircle"/>
  </svg>
</div>

<div id="flash"></div>

<div id="app">
  <div id="clock">25:00</div>
  <div id="status">work · #1</div>
</div>

<div id="hint">spc — start/pause · r — reset · b — break · [ ] — time</div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 96;

const state = {
  workDur:  25 * 60,
  breakDur:  5 * 60,
  remaining: 25 * 60,
  total:     25 * 60,
  running:   false,
  isBreak:   false,
  session:   1,
  interval:  null,
};

const clockEl   = document.getElementById('clock');
const statusEl  = document.getElementById('status');
const progEl    = document.getElementById('progCircle');
const flashEl   = document.getElementById('flash');

progEl.style.strokeDasharray  = CIRCUMFERENCE;
progEl.style.strokeDashoffset = 0;

function fmt(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function render() {
  clockEl.textContent = fmt(state.remaining);

  const pct = state.remaining / state.total;
  progEl.style.strokeDashoffset = CIRCUMFERENCE * pct;

  const mode = state.isBreak ? 'break' : 'work';
  statusEl.textContent = `${mode} · #${state.session}`;

  clockEl.classList.toggle('paused',     !state.running);
  clockEl.classList.toggle('break-mode', state.isBreak);
  progEl.classList.toggle('break-mode',  state.isBreak);
}

function tick() {
  if (state.remaining <= 0) {
    endSession();
    return;
  }
  state.remaining--;
  render();
}

function endSession() {
  clearInterval(state.interval);
  state.running = false;

  flashEl.classList.remove('go');
  void flashEl.offsetWidth;
  flashEl.classList.add('go');

  if (!state.isBreak) {
    // switch to break
    state.isBreak  = true;
    state.total    = state.breakDur;
    state.remaining= state.breakDur;
  } else {
    // switch to work
    state.isBreak  = false;
    state.session++;
    state.total    = state.workDur;
    state.remaining= state.workDur;
  }
  render();
  // auto-start next
  startTimer();
}

function startTimer() {
  if (state.running) return;
  state.running = true;
  state.interval = setInterval(tick, 1000);
  render();
}

function pauseTimer() {
  if (!state.running) return;
  clearInterval(state.interval);
  state.running = false;
  render();
}

function toggleTimer() {
  state.running ? pauseTimer() : startTimer();
}

function resetTimer() {
  clearInterval(state.interval);
  state.running   = false;
  state.isBreak   = false;
  state.remaining = state.workDur;
  state.total     = state.workDur;
  render();
}

function toggleBreak() {
  clearInterval(state.interval);
  state.running = false;
  state.isBreak = !state.isBreak;
  state.total     = state.isBreak ? state.breakDur : state.workDur;
  state.remaining = state.total;
  render();
}

function adjustWork(delta) {
  if (state.running) return;
  state.workDur = Math.max(60, Math.min(60*60, state.workDur + delta * 60));
  if (!state.isBreak) {
    state.total = state.workDur;
    state.remaining = state.workDur;
  }
  render();
}

document.addEventListener('keydown', e => {
  switch (e.key) {
    case ' ':
      e.preventDefault();
      toggleTimer();
      break;
    case 'r': case 'R':
      resetTimer();
      break;
    case 'b': case 'B':
      toggleBreak();
      break;
    case '[':
      adjustWork(-1);
      break;
    case ']':
      adjustWork(+1);
      break;
  }
});

render();
</script>
</body>
</html>
